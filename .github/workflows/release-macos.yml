name: Release macOS

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Generate APNsSecrets.swift
        run: |
          cat > Codync-macOS/Services/APNsSecrets.swift << 'SWIFT'
          enum APNsSecrets {
              static let workerURL = "${{ secrets.APNS_WORKER_URL }}"
              static let apiSecret = "${{ secrets.APNS_API_SECRET }}"
          }
          SWIFT

      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE: ${{ secrets.DEVELOPER_ID_PROVISION_PROFILE }}
        run: |
          CERT_FILE=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_FILE=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          security import "$CERT_FILE" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_FILE"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          security list-keychain -d user -s "$KEYCHAIN_FILE"

          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROVISION_PROFILE" | base64 --decode \
            > ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/codync-devid.provisionprofile

      - name: Build
        run: |
          xcodebuild build \
            -project Codync.xcodeproj \
            -scheme Codync \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/derived \
            -quiet \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ env.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Sign app with Developer ID
        run: |
          APP_PATH=$(find build/derived -name "Codync.app" -path "*/Release/*" | head -1)

          cp ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/codync-devid.provisionprofile \
            "$APP_PATH/Contents/embedded.provisionprofile"

          cat > $RUNNER_TEMP/release.entitlements << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.icloud-container-environment</key>
            <string>Production</string>
            <key>com.apple.developer.icloud-container-identifiers</key>
            <array><string>iCloud.com.pokai.Codync</string></array>
            <key>com.apple.developer.icloud-services</key>
            <array><string>CloudKit</string></array>
          </dict>
          </plist>
          PLIST

          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements $RUNNER_TEMP/release.entitlements \
            "$APP_PATH"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Codync.app"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Codync.app" \
            "$RUNNER_TEMP/codync-submit.zip"

          xcrun notarytool submit "$RUNNER_TEMP/codync-submit.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/Codync.app"

      - name: Create DMG
        run: |
          DMG_DIR=$RUNNER_TEMP/dmg_staging
          mkdir -p "$DMG_DIR"
          cp -R "$RUNNER_TEMP/export/Codync.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "Codync" -srcfolder "$DMG_DIR" \
            -ov -format UDZO build/Codync-macOS.dmg

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            build/Codync-macOS.dmg \
            --title "Codync ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          SHA=$(shasum -a 256 build/Codync-macOS.dmg | awk '{print $1}')
          git clone https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/leepokai/homebrew-codync.git tap
          cat > tap/Casks/codync.rb << RUBY
          cask "codync" do
            version "${{ env.VERSION }}"
            sha256 "${SHA}"

            url "https://github.com/leepokai/Codync/releases/download/v#{version}/Codync-macOS.dmg"
            name "Codync"
            desc "Real-time Claude Code session monitor for macOS menu bar"
            homepage "https://codync.dev"

            app "Codync.app"

            zap trash: [
              "~/Library/Preferences/com.pokai.Codync.plist",
              "~/.codync",
            ]
          end
          RUBY
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Codync to ${{ env.VERSION }}" || exit 0
          git push
