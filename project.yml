name: CodePulse
options:
  bundleIdPrefix: com.pokai
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  CodePulseShared:
    path: CodePulseShared

targets:
  CodePulse:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: CodePulse-macOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pokai.CodePulse
        PRODUCT_NAME: CodePulse
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: CodePulse-macOS/App/CodePulse.entitlements
        ENABLE_APP_SANDBOX: false
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
    entitlements:
      path: CodePulse-macOS/App/CodePulse.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.pokai.CodePulse
        com.apple.developer.icloud-services:
          - CloudKit
    dependencies:
      - package: CodePulseShared

  CodePulse-iOS:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: CodePulse-iOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pokai.CodePulse.ios
        PRODUCT_NAME: CodePulse
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_ENTITLEMENTS: CodePulse-iOS/App/CodePulse-iOS.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: CodePulse-iOS/App/CodePulse-iOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.pokai.CodePulse
        com.apple.developer.icloud-services:
          - CloudKit
    dependencies:
      - package: CodePulseShared
      - target: CodePulseLiveActivity

  CodePulseLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: CodePulseLiveActivity
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pokai.CodePulse.ios.LiveActivity
        PRODUCT_NAME: CodePulseLiveActivity
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: CodePulseLiveActivity
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: CodePulseShared
